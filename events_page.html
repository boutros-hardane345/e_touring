<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>e_Touring | Events</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Segoe+UI');
:root{--green:#2f7d32;--dark:#1b1b1b;--gray:#f4f4f4;--white:#fff}
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",Arial}
body{background:var(--gray)}
header{background:#fff;border-bottom:1px solid #ddd;position:fixed;width:100%;top:0}
nav{display:flex;justify-content:space-between;align-items:center;padding:15px 30px}
.logo{
    color:var(--green);
    font-weight:800;
    font-size:22px;
}.nav-links{display:flex;gap:20px}
.nav-links a{text-decoration:none;color:var(--dark); font-weight : bold}
.nav-links a:hover{color:var(--green)}
.menu-btn{display:none;font-size:26px}
main{margin-top:100px;padding:40px}
.events{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,.1)}
.card img{width:100%;height:160px;object-fit:cover}
.card div{padding:15px}
.card h3{color:var(--green)}
@media(max-width:768px){
.nav-links{position:absolute;top:70px;right:0;background:#fff;flex-direction:column;
width:220px;display:none}
.nav-links.active{display:flex}
.menu-btn{display:block}
}
    /* ===== FOOTER ===== */
.site-footer{
    background:#fff;
    border-top:1px solid #ddd;
    text-align:center;
    padding:18px 10px;
    margin-top:60px;
    font-size:14px;
    color:#555;
}

.site-footer strong{
    color:var(--green);
}

</style>
</head>

<body>
<header>
<nav>
<div class="logo">e_Touring</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="nav-links" id="navLinks">
<a href="home_page.html">Home</a>
<a href="about_us_page.html">About</a>
<a href="events_page.html">Events</a>
<a href="plans_pages.html">Plans</a>
<a href="register_page.html">Volunteer</a>
<a href="contact_us_page.html">Contact</a>
</div>
</nav>
</header>

<main>
<h2>Upcoming & Past Events</h2>
<div class="events">

<div class="card">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
<div>
<h3>Hiking – Tannourine</h3>
<p><i class="fa fa-calendar"></i> 20 March</p>
<p>$20 – 25 Participants</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<div>
<h3>Beach Cleanup – Batroun</h3>
<p><i class="fa fa-calendar"></i> 25 May</p>
<p>Free – 60 Volunteers</p>
</div>
</div>

</div>
</main>

<script>
    function toggleMenu() { document.getElementById("navLinks").classList.toggle("active"); }
</script>
     <footer class="site-footer">
    <p>© 2026 <strong>e_Touring</strong>. All rights reserved.</p>
</footer>
</body>
</html>
