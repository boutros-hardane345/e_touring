<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>e_Touring | Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--green:#2f7d32;--dark:#1b1b1b;--gray:#f4f4f4;--white:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",Arial}
body{background:var(--gray);color:var(--dark)}
header{background:var(--white);border-bottom:1px solid #ddd;position:fixed;width:100%;top:0;z-index:1000}
nav{display:flex;justify-content:space-between;align-items:center;padding:15px 30px}
.logo{
    color:var(--green);
    font-weight:800;
    font-size:22px;
}
.nav-links{display:flex;gap:20px}
.nav-links a{text-decoration:none;color:var(--dark); font-weight : bold}
.nav-links a:hover{color:var(--green)}
.menu-btn{display:none;font-size:26px;cursor:pointer}
main{margin-top:100px;padding:40px;text-align:center}
.image-container{position:relative;max-width:900px;margin:auto}
.image-container img{width:100%;border-radius:10px}
.overlay-text{position:absolute;bottom:15px;right:20px;color:#fff;
background:rgba(0,0,0,.5);padding:8px 15px;border-radius:5px;font-size:24px}
.home-buttons{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;margin-top:25px}
button{background:var(--green);color:#fff;border:none;padding:12px 20px;border-radius:6px;cursor:pointer}
button:hover{background:#256628}
@media(max-width:768px){
.nav-links{position:absolute;top:70px;right:0;background:#fff;flex-direction:column;
width:220px;display:none;box-shadow:0 5px 15px rgba(0,0,0,.2);padding:20px}
.nav-links.active{display:flex}
.menu-btn{display:block}
}
    /* ===== FOOTER ===== */
.site-footer{
    background:#fff;
    border-top:1px solid #ddd;
    text-align:center;
    padding:18px 10px;
    margin-top:60px;
    font-size:14px;
    color:#555;
}

.site-footer strong{
    color:var(--green);
}

</style>
</head>

<body>
<header>
<nav>
<div class="logo">e_Touring</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="nav-links" id="navLinks">
<a href="home_page.html">Home</a>
<a href="about_us_page.html">About</a>
<a href="events_page.html">Events</a>
<a href="plans_pages.html">Plans</a>
<a href="register_page.html">Volunteer</a>
<a href="contact_us_page.html">Contact</a>
</div>
</nav>
</header>

<main>
<div class="image-container">
<img src="home_photo.jpg">
<div class="overlay-text">Welcome to e-Touring</div>
</div>

<p style="margin-top:20px">Discover eco-adventures across Lebanon.</p>

<div class="home-buttons">
<a href="events_page.html"><button>View Events</button></a>
<a href="plans_pages.html"><button>Our Plans</button></a>
<a href="register_page.html"><button>Volunteer</button></a>
<a href="contact_us_page.html"><button>Contact</button></a>
</div>
</main>

<script>
    function toggleMenu() { document.getElementById("navLinks").classList.toggle("active"); }
</script>

    <footer class="site-footer">
    <p>© 2026 <strong>e_Touring</strong>. All rights reserved.</p>
</footer>

</body>
</html>
